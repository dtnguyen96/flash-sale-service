version: '3.8'

services:
  # The Relational Database (Source of Truth)
  postgres:
    image: postgres:15-alpine
    container_name: flashsale-postgres
    restart: always
    environment:
      POSTGRES_USER: flashsale_user
      POSTGRES_PASSWORD: secretpassword
      POSTGRES_DB: flashsale_db
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  # The In-Memory Cache (Concurrency Engine)
  redis:
    image: redis:7-alpine
    container_name: flashsale-redis
    restart: always
    ports:
      - "6379:6379"
    # Starting Redis with appendonly yes ensures we don't lose all cache data if the container restarts
    command: redis-server --appendonly yes
    volumes:
      - redis-data:/data

volumes:
  postgres-data:
  redis-data: